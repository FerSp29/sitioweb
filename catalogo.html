<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Exclusivo | Cronos Élite</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="container nav-flex">
            <a href="index.html" class="logo">CRONOS<span>ÉLITE</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="index.html#nosotros">Nosotros</a></li>
                <li><a href="catalogo.html" class="active">Catálogo</a></li>
                <li><a href="index.html#contacto" class="btn-nav">Contacto</a></li>
            </ul>
        </div>
    </nav>

    <section class="section dark-bg" style="min-height: 100vh; padding-top: 120px;">
        <div class="container">
            <h2 class="center-text">Nuestra Colección</h2>
            <div class="catalog-grid">
                <div class="card card-1">
                    <div class="card-info">
                        <h3>Midnight Black</h3>
                        <p>Acero Inoxidable y cristal de zafiro</p>
                        <span class="price">$299</span>
                        <button class="btn-buy">Ver Detalles</button>
                    </div>
                </div>
                <div class="card card-2">
                    <div class="card-info">
                        <h3>Golden Heritage</h3>
                        <p>Bañado en oro de 18k y cuero</p>
                        <span class="price">$450</span>
                        <button class="btn-buy">Ver Detalles</button>
                    </div>
                </div>
                <div class="card card-3">
                    <div class="card-info">
                        <h3>Ocean Master</h3>
                        <p>Resistente al agua - 200m</p>
                        <span class="price">$320</span>
                        <button class="btn-buy">Ver Detalles</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2026 Cronos Élite. Todos los derechos reservados.</p>
    </footer>
    
</body>
</html>
